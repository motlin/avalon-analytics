# Jobs that run on merge_group, meaning they must pass before changes land. They also run on pull_request.

on:
    pull_request:
    merge_group:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            checks: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v7
            - uses: jdx/mise-action@v4

            - run: just lint-ci
              continue-on-error: true

            - uses: ataylorme/eslint-annotate-action@2.2.0
              if: always()

    format:
        name: Format (Biome)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: jdx/mise-action@v4

            - run: just format-ci

    typecheck:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: jdx/mise-action@v4

            - run: just typecheck-ci

    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: jdx/mise-action@v4

            - run: just build-ci

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: jdx/mise-action@v4

            - run: just test-ci

    check-generated:
        name: Check generated files
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: jdx/mise-action@v4

            - run: just generate-ci
            - run: git diff --exit-code

    all-checks:
        name: All checks
        if: ${{ !cancelled() }}
        needs: [lint, format, typecheck, build, test, check-generated]
        runs-on: ubuntu-latest
        steps:
            - uses: re-actors/alls-green@release/v1
              with:
                  jobs: ${{ toJSON(needs) }}
